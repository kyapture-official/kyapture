version: "3.9"

services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: photodelivery
      POSTGRES_USER: photodelivery
      POSTGRES_PASSWORD: photodelivery
